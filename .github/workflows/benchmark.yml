name: Benchmark

on:
  push:
    branches: [main, develop, release/**]
  pull_request:
    branches: [main, develop, release/**]
  workflow_dispatch:

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        
      - name: Build benchmarks
        run: cargo build --release --benches
        
      - name: Run Lexer/Parser benchmarks
        run: cargo bench --bench lexer_parser_bench
        
      - name: Run Executor benchmarks
        run: cargo bench --bench executor_bench
        
      - name: Run Storage benchmarks
        run: cargo bench --bench storage_bench
        
      - name: Run Network benchmarks
        run: cargo bench --bench network_bench
        
      - name: Run Integration benchmarks
        run: cargo bench --bench integration_bench
        
      - name: Run SQL Operations benchmarks
        run: cargo bench --bench sql_operations
        
      - name: Run Parser benchmarks
        run: cargo bench --bench parser_bench
        
      - name: Run Lexer benchmarks
        run: cargo bench --bench lexer_bench

  # Note: Benchmark upload disabled - criterion 0.5 compatibility issue
  # Upload can be re-enabled once criterion produces JSON output

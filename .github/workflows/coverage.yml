name: Coverage

on:
  push:
    branches: [develop/v2.6.0, main, feature/coverage-workflow]
  pull_request:
    branches: [develop/v2.6.0]

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Run coverage
        run: |
          cargo tarpaulin --all-features \
            --out Html \
            --out Json \
            --out Xml \
            --output-dir ./artifacts/coverage \
            --fail-under 65

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./artifacts/coverage/tarpaulin-report.html

      - name: Upload coverage JSON
        uses: actions/upload-artifact@v4
        with:
          name: coverage-json
          path: ./artifacts/coverage/tarpaulin-report.json

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: ./artifacts/coverage/tarpaulin-report.xml

name: Formal Smoke (PR Gate)

on:
  pull_request:
    branches:
      - develop/v2.9.0
      - beta/v2.9.0
    paths:
      - 'docs/formal/**/*.tla'
      - 'docs/formal/**/*.cfg'
      - 'crates/transaction/**/*.rs'
      - 'scripts/formal/**'

jobs:
  formal-smoke:
    name: Formal Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check TLA+ tools
        run: |
          if [ ! -f "/tmp/tla2tools.jar" ]; then
            echo "Downloading TLA+ tools..."
            curl -sL https://github.com/tlaplus/tlaplus/releases/download/v1.7.0/tla2tools.jar \
              -o /tmp/tla2tools.jar
          fi
          echo "TLA+ tools: $(ls -lh /tmp/tla2tools.jar)"

      - name: Run Formal Smoke
        run: |
          bash scripts/formal/formal_smoke.sh

      - name: Run Proof Coverage
        id: coverage
        run: |
          bash scripts/formal/proof_coverage.sh --ci || true
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Check Coverage Gate
        run: |
          EXIT_CODE=$(grep exit_code $GITHUB_OUTPUT | cut -d= -f2 || echo "0")
          echo "Coverage exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" = "1" ]; then
            echo "PROOF COVERAGE FAILED: <50% coverage"
            exit 1
          fi
          echo "Proof coverage gate: passed (WARN is acceptable in PR Gate)"

  rust-transaction-tests:
    name: Transaction Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "transaction-smoke"
          cache-targets: false

      - name: Run deadlock tests
        run: cargo test -p sqlrustgo-transaction deadlock -- --nocapture

      - name: Run MVCC tests
        run: cargo test -p sqlrustgo-transaction mvcc -- --nocapture || true

      - name: Run SSI tests
        run: cargo test -p sqlrustgo-transaction ssi -- --nocapture || true

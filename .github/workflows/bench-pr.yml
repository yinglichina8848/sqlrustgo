name: Benchmark PR

on:
  pull_request:
    branches: [develop/**]
  push:
    branches: [develop/**]

jobs:
  quick-benchmark:
    name: Quick Benchmark (SF=0.1)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build bench-cli
        run: |
          # Limit virtual memory to 8GB
          ulimit -v 8388608
          cargo build --release -p sqlrustgo-bench-cli

      - name: Create sample SQL file for custom benchmark
        run: |
          mkdir -p benchmarks/sql
          echo "SELECT * FROM orders WHERE order_id = 1" > benchmarks/sql/sample.sql

      - name: Run TPC-H SF=0.1
        run: |
          mkdir -p benchmarks/results/sf01
          ./target/release/sqlrustgo-bench-cli tpch --scale 0.1 --iterations 3 --output benchmarks/results/sf01/tpch.json

      - name: Run OLTP SF=0.1
        run: |
          ./target/release/sqlrustgo-bench-cli oltp --duration 10 --threads 1 --output benchmarks/results/sf01/oltp.json

      - name: Run Custom SF=0.1
        run: |
          ./target/release/sqlrustgo-bench-cli custom --file benchmarks/sql/sample.sql --iterations 3 --output benchmarks/results/sf01/custom.json

      - name: Compare with baseline
        run: python scripts/compare_benchmarks.py benchmarks/baselines/sf01 benchmarks/results/sf01

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-sf01
          path: benchmarks/results/sf01/
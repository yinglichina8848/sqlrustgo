name: Benchmark Schedule

on:
  schedule:
    - cron: '0 0 * * 1'  # Monday at midnight UTC
  workflow_dispatch:  # Manual trigger

jobs:
  full-benchmark:
    name: Full Benchmark Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build bench-cli
        run: |
          # Limit virtual memory to 8GB
          ulimit -v 8388608
          cargo build --release -p sqlrustgo-bench-cli

      - name: Create sample SQL file for custom benchmark
        run: |
          mkdir -p benchmarks/sql
          echo "SELECT * FROM orders WHERE order_id = 1" > benchmarks/sql/sample.sql

      - name: Run SF=0.1 benchmarks
        run: |
          mkdir -p benchmarks/results/sf01
          ./target/release/sqlrustgo-bench-cli tpch --scale 0.1 --iterations 3 --output benchmarks/results/sf01/tpch.json
          ./target/release/sqlrustgo-bench-cli oltp --duration 10 --threads 1 --output benchmarks/results/sf01/oltp.json
          ./target/release/sqlrustgo-bench-cli custom --file benchmarks/sql/sample.sql --iterations 3 --output benchmarks/results/sf01/custom.json

      - name: Run SF=1 benchmarks
        run: |
          mkdir -p benchmarks/results/sf1
          ./target/release/sqlrustgo-bench-cli tpch --scale 1 --iterations 3 --output benchmarks/results/sf1/tpch.json
          ./target/release/sqlrustgo-bench-cli oltp --duration 30 --threads 1 --output benchmarks/results/sf1/oltp.json
          ./target/release/sqlrustgo-bench-cli custom --file benchmarks/sql/sample.sql --iterations 3 --output benchmarks/results/sf1/custom.json

      - name: Run SF=10 benchmarks
        run: |
          mkdir -p benchmarks/results/sf10
          ./target/release/sqlrustgo-bench-cli tpch --scale 10 --iterations 3 --output benchmarks/results/sf10/tpch.json
          ./target/release/sqlrustgo-bench-cli oltp --duration 60 --threads 1 --output benchmarks/results/sf10/oltp.json
          ./target/release/sqlrustgo-bench-cli custom --file benchmarks/sql/sample.sql --iterations 3 --output benchmarks/results/sf10/custom.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-full
          path: benchmarks/results/
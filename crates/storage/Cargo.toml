[package]
name = "sqlrustgo-storage"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
sqlrustgo-common.workspace = true
sqlrustgo-types.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
log.workspace = true
async-trait.workspace = true
miniz_oxide.workspace = true
fnv.workspace = true

# Parquet support for columnar storage
# Pin chrono to 0.4.38 to avoid compatibility issues with arrow-arith
parquet = { version = "45.0", features = ["snap", "flate2", "brotli", "lz4", "zstd"] }
arrow = { version = "45.0", features = ["prettyprint"] }
chrono = "=0.4.38"

[dev-dependencies]
tempfile.workspace = true

[package]
name = "sqlrustgo-storage"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
sqlrustgo-common.workspace = true
sqlrustgo-types.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
log.workspace = true
async-trait.workspace = true
miniz_oxide.workspace = true
fnv.workspace = true

# Parquet support for columnar storage
parquet = { version = "46.0", features = ["snap", "flate2", "brotli", "lz4", "zstd"] }
arrow = { version = "52.0", features = ["prettyprint"] }

[dev-dependencies]
tempfile.workspace = true

# MySQL Protocol Test Gate — v3.0.0
# Tests MySQL protocol handshake and basic queries using mysql client.
# Blocking on develop/v3.0.0 PRs.

name: MySQL Protocol Test

on:
  push:
    branches:
      - develop/v3.0.0
      - beta/v3.0.0
  pull_request:
    branches:
      - develop/v3.0.0
      - beta/v3.0.0
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  mysql-protocol-test:
    runs-on: [hp-z6g4]
    steps:
      - name: Checkout
        run: |
          REPO="openclaw/sqlrustgo"
          git clone --depth=1 "http://192.168.0.252:3000/$REPO" repo
          cd repo
          git fetch --depth=1 origin "$GITEA_SHA"
          git checkout "$GITEA_SHA"

      - name: Build sqlrustgo
        run: |
          cd repo
          cargo build -p sqlrustgo-mysql-server --quiet 2>&1 | tail -3

      - name: Check mysql client
        run: |
          which mysql && echo "mysql found: $(mysql --version)" || echo "mysql client not installed"

      - name: Check docker
        run: |
          which docker && echo "docker found: $(docker --version)" || echo "docker not installed"

      - name: Run mysql client test
        run: |
          cd repo
          # Start server in background
          cargo run -p sqlrustgo-mysql-server &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID"
          sleep 5

          # Test with mysql client if available
          if command -v mysql &>/dev/null; then
            echo "Testing MySQL protocol handshake..."
            mysql -h 127.0.0.1 -P 3306 -u root -e "SELECT 1 AS test;" 2>&1 | tee mysql_test.txt

            if grep -q "test" mysql_test.txt; then
              echo "MySQL Protocol Test: PASS"
            else
              echo "MySQL Protocol Test: FAIL"
              exit 1
            fi
          else
            echo "MySQL client not available, skipping protocol test"
          fi

          # Cleanup
          kill $SERVER_PID 2>/dev/null || true

      - name: Test with official MySQL container (if docker available)
        if: false  # Disable for now, requires docker setup
        run: |
          cd repo
          if command -v docker &>/dev/null; then
            echo "Testing with MySQL 5.7 container..."
            docker run --rm --name sqlrustgo-protocol-test \
              -e MYSQL_ALLOW_EMPTY_PASSWORD=yes \
              -p 3307:3306 \
              mysql:5.7 &
            sleep 10

            # Test connection
            mysql -h 127.0.0.1 -P 3307 -u root -e "SELECT 'MySQL 5.7 works' AS status;"

            docker stop sqlrustgo-protocol-test 2>/dev/null || true
          fi
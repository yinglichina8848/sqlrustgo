# Sysbench QPS Gate — v3.0.0
# Runs sysbench benchmarks and validates QPS meets baseline.
# Blocking on develop/v3.0.0 PRs.

name: Sysbench QPS Gate

on:
  push:
    branches:
      - develop/v3.0.0
      - beta/v3.0.0
  pull_request:
    branches:
      - develop/v3.0.0
      - beta/v3.0.0
  workflow_dispatch:
    inputs:
      baseline:
        description: 'Baseline commit to compare against'
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always
  SYSBENCH_TIME: 30
  SYSBENCH_THREADS: 8

jobs:
  sysbench-gate:
    runs-on: [hp-z6g4]
    steps:
      - name: Checkout
        run: |
          REPO="openclaw/sqlrustgo"
          git clone --depth=1 "http://192.168.0.252:3000/$REPO" repo
          cd repo
          git fetch --depth=1 origin "$GITEA_SHA"
          git checkout "$GITEA_SHA"

      - name: Build sqlrustgo
        run: |
          cd repo
          cargo build -p sqlrustgo-mysql-server --quiet 2>&1 | tail -3

      - name: Start sqlrustgo server
        run: |
          cd repo
          # Start server in background
          cargo run -p sqlrustgo-mysql-server &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          # Wait for server to start
          sleep 5

      - name: Check sysbench
        run: |
          which sysbench || echo "sysbench not installed, will use internal benchmark"

      - name: Run Sysbench Point Select
        if: false  # Disable if sysbench not available
        run: |
          cd repo
          export HOST=127.0.0.1
          export PORT=3306
          bash scripts/sysbench/point_select.sh ${{ env.SYSBENCH_THREADS }} ${{ env.SYSBENCH_TIME }}

      - name: Run Internal Point Select Benchmark
        run: |
          cd repo
          cargo run -p sqlrustgo-bench-cli -- point-select --iterations 3 --threads ${{ env.SYSBENCH_THREADS }} 2>&1 | tee sysbench_results.txt

      - name: Gate Decision
        run: |
          cd repo
          if [ -f sysbench_results.txt ]; then
            QPS=$(grep -oE 'queries: [0-9]+' sysbench_results.txt | head -1 | grep -oE '[0-9]+' || echo "0")
            echo "Point Select QPS: $QPS"

            # Baseline thresholds (v2.9.0 baseline: ~2000 QPS)
            BASELINE=2000
            TARGET=8000

            if [ "$QPS" -ge "$TARGET" ]; then
              echo "Sysbench Gate: EXCELLENT (>= $TARGET QPS)"
            elif [ "$QPS" -ge "$BASELINE" ]; then
              echo "Sysbench Gate: PASS (>= $BASELINE QPS)"
            else
              echo "Sysbench Gate: FAIL (< $BASELINE QPS)"
              exit 1
            fi
          else
            echo "Sysbench Gate: SKIP (no results)"
          fi

      - name: Cleanup
        if: always()
        run: |
          pkill -f sqlrustgo-mysql-server 2>/dev/null || true
          pkill -f sqlrustgo-bench-cli 2>/dev/null || true
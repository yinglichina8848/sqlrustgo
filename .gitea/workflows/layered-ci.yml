name: Layered CI (L0-L2)

on:
  push:
    branches:
      - 'develop/v3.2.0'
      - 'rc/v3.2.0'
  pull_request:
    branches:
      - 'develop/v3.2.0'
      - 'rc/v3.2.0'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  # L0: 编译验证 (每次 PR 必须)
  l0-build:
    name: L0 Build
    runs-on:
      - nomad
    timeout-minutes: 10
    steps:
      - name: Checkout
        run: |
          set -e
          git clone "${{ github.server_url }}/${{ github.repository }}.git" .
          git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Detect Changed Crates
        id: changed
        run: |
          set -e
          CHANGED=$(bash scripts/ci/detect_changed_crates.sh "${{ github.base_ref }}" 2>/dev/null || echo "")
          echo "crates=$CHANGED" >> $GITHUBUB_OUTPUT
          echo "crates=$CHANGED"

      - name: Rust Setup
        run: |
          set -e
          rustup default stable
          cargo fetch

      - name: L0 Check
        run: timeout 5m cargo check --all-features

      - name: L0 Build
        run: timeout 8m cargo build --release --workspace

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: l0-artifacts
          path: target/release/**/*.rlib
          retention-days: 1

  # L1: 单元测试 (每次 PR 必须)
  l1-unit-tests:
    name: L1 Unit Tests
    runs-on:
      - nomad
    timeout-minutes: 10
    steps:
      - name: Checkout
        run: |
          set -e
          git clone "${{ github.server_url }}/${{ github.repository }}.git" .
          git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: target/
          key: l0-cache-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: l0-cache-${{ runner.os }}-

      - name: Rust Setup
        run: |
          set -e
          rustup default stable
          cargo fetch

      - name: L1 Lib Tests
        run: timeout 8m cargo test --lib --all-features

      - name: L1 Doc Tests
        run: timeout 4m cargo test --doc --all-features

  # L2: 增量集成测试 (检测到 crate 变更时运行)
  l2-incremental-tests:
    name: L2 Incremental Tests
    runs-on:
      - nomad
    timeout-minutes: 20
    steps:
      - name: Checkout
        run: |
          set -e
          git clone "${{ github.server_url }}/${{ github.repository }}.git" .
          git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: target/
          key: l1-cache-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: l1-cache-${{ runner.os }}-

      - name: Detect Changed Crates
        id: changed
        run: |
          set -e
          CHANGED=$(bash scripts/ci/detect_changed_crates.sh "${{ github.base_ref }}" 2>/dev/null || echo "")
          echo "crates=$CHANGED" >> $GITHUBUB_OUTPUT

      - name: L2 Run per-crate tests
        run: |
          set -e
          for CRATE in ${{ steps.changed.outputs.crates }}; do
            echo "Testing crate: $CRATE"
            timeout 15m cargo test -p "sqlrustgo-${CRATE}" --all-features
          done

  # L3: 全量门禁 (合并前才运行)
  l3-full-gate:
    name: L3 Full Gate
    runs-on:
      - nomad
    timeout-minutes: 45
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    steps:
      - name: Checkout
        run: |
          set -e
          git clone "${{ github.server_url }}/${{ github.repository }}.git" .
          git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: target/
          key: l2-cache-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: l2-cache-${{ runner.os }}-

      - name: L3 Full test
        run: timeout 40m cargo test --workspace --all-features

      - name: L3 Clippy
        run: timeout 10m cargo clippy --all-features -- -D warnings

      - name: L3 Format
        run: timeout 5m cargo fmt --check --all

      - name: L3 Gate Scripts
        run: |
          bash scripts/gate/check_docs_links.sh || true
          bash scripts/gate/check_security.sh || true

name: Hermes Pipeline
run-name: ${{ gitea.ref_name }} - ${{ gitea.sha }}

on:
  push:
    branches:
      - develop/v2.8.0
      - beta/v2.8.0
      - ci/gitea-compat
      - ci/v2.8.0-*
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'ARCHITECTURE_RULES.md'
      - 'CHANGELOG.md'
      - 'RELEASE_NOTES.md'
  pull_request:
    branches:
      - develop/v2.8.0
      - beta/v2.8.0
      - ci/gitea-compat
      - ci/v2.8.0-*
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'VERSION'
      - 'ARCHITECTURE_RULES.md'
      - 'CHANGELOG.md'
      - 'RELEASE_NOTES.md'

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "1"

lint:
  runs-on: [hp-z6g4]
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - name: Install clippy + rustfmt
      run: rustup component add clippy rustfmt 2>/dev/null || true
    - name: Clippy
      run: cargo clippy --all-features -- -D warnings
    - name: Format check
      run: cargo fmt --check --all

build:
  runs-on: [hp-z6g4]
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - name: Build
      run: cargo build --all-features

test:
  runs-on: [hp-z6g4]
  needs: [build]
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - name: Build
      run: cargo build --all-features
    - name: Run tests
      run: cargo test --all-features 2>&1 | tee test_report.log
    - name: Test summary
      if: always()
      run: |
        PASS=$(grep -c 'test result: ok' test_report.log 2>/dev/null || echo "0")
        FAIL=$(grep -c 'test result: FAILED' test_report.log 2>/dev/null || echo "0")
        echo "Tests: passed=$PASS failed=$FAIL"
        if [ "$FAIL" -gt 0 ]; then exit 1; fi

gate:
  runs-on: [hp-z6g4]
  needs: [test]
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - name: Run Gate
      run: |
        chmod +x gate/hermes_gate.sh
        bash gate/hermes_gate.sh

verify:
  runs-on: [hp-z6g4]
  needs: [test]
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - name: Run verification
      run: python3 verify/verification_engine.py

audit:
  runs-on: [hp-z6g4]
  needs: [verify]
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - name: Run audit
      run: python3 audit/self_audit.py

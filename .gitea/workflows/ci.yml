name: Hermes Pipeline
run-name: ${{ gitea.ref_name }} - ${{ gitea.sha }}

on:
  push:
    branches:
      - develop/v2.8.0
  pull_request:
    branches:
      - develop/v2.8.0

jobs:
  ##################################
  # Precheck: 防炸门控
  ##################################
  precheck:
    runs-on: [hp-z6g4]
    steps:
      - uses: actions/checkout@v4
      - name: Check PR freshness
        run: |
          git fetch origin develop/v2.8.0
          BEHIND=$(git rev-list --count HEAD..origin/develop/v2.8.0 2>/dev/null || echo "0")
          echo "Behind develop/v2.8.0: $BEHIND commits"
          if [ "$BEHIND" -gt 50 ]; then
            echo "❌ PR too old ($BEHIND commits behind), please rebase first"
            exit 1
          fi
          echo "✅ PR is fresh enough"

  ##################################
  # Build
  ##################################
  build:
    needs: [precheck]
    runs-on: [hp-z6g4]
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --all-features
      - name: Archive binary
        uses: actions/upload-artifact@v3
        with:
          name: sqlrustgo-bin
          path: target/debug/sqlrustgo

  ##################################
  # Test
  ##################################
  test:
    needs: [build]
    runs-on: [hp-z6g4]
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: cargo test --all-features 2>&1 | tee test_report.log
      - name: Test summary
        run: |
          PASS=$(grep -c 'test result: ok' test_report.log 2>/dev/null | tr -cd '0-9' || echo "0")
          FAIL=$(grep -c 'test result: FAILED' test_report.log 2>/dev/null | tr -cd '0-9' || echo "0")
          PASS=${PASS:-0}
          FAIL=${FAIL:-0}
          [ -z "$PASS" ] && PASS=0
          [ -z "$FAIL" ] && FAIL=0
          echo "{\"passed\": $([ "${FAIL}" -eq 0 ] && echo 'true' || echo 'false'), \"total\": $((PASS+FAIL))}" > test_report.json

  ##################################
  # Hermes Gate (clippy + fmt + audit)
  ##################################
  gate:
    needs: [test]
    runs-on: [hp-z6g4]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          rustup component add clippy rustfmt 2>/dev/null || true
      - name: Run Gate
        run: |
          chmod +x gate/hermes_gate.sh
          bash gate/hermes_gate.sh
      - name: Upload gate report
        uses: actions/upload-artifact@v3
        with:
          name: gate-report
          path: gate_report.json

  ##################################
  # Verification
  ##################################
  verify:
    needs: [gate]
    runs-on: [hp-z6g4]
    steps:
      - uses: actions/checkout@v4
      - name: Run verification
        run: python3 verify/verification_engine.py
      - name: Upload verification report
        uses: actions/upload-artifact@v3
        with:
          name: verification-report
          path: verification_report.json

  ##################################
  # Audit
  ##################################
  audit:
    needs: [verify]
    runs-on: [hp-z6g4]
    steps:
      - uses: actions/checkout@v4
      - name: Run audit
        run: python3 audit/self_audit.py
      - name: Upload audit report
        uses: actions/upload-artifact@v3
        with:
          name: audit-report
          path: audit_report.json

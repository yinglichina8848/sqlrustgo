name: Hermes Pipeline
run-name: ${{ gitea.ref_name }} - ${{ gitea.sha }}

'on':
  push:
    branches:
      - develop/v2.8.0
      - beta/v2.8.0
      - ci/gitea-compat
      - ci/v2.8.0-*
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - ARCHITECTURE_RULES.md
      - CHANGELOG.md
      - RELEASE_NOTES.md
  pull_request:
    branches:
      - develop/v2.8.0
      - beta/v2.8.0
      - ci/gitea-compat
      - ci/v2.8.0-*
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - VERSION
      - ARCHITECTURE_RULES.md
      - CHANGELOG.md
      - RELEASE_NOTES.md

env:
  CARGO_TERM_COLOR: always

# Combined lint + build: share one clone, build once
jobs:
  lint-build:
    runs-on: [hp-z6g4]
    steps:
      - name: Checkout
        run: |
          REPO="openclaw/sqlrustgo"
          git clone --depth=1 "http://192.168.0.252:3000/$REPO" repo
          cd repo
          git fetch --depth=1 origin "$GITEA_SHA"
          git checkout "$GITEA_SHA"
      - name: Clippy
        run: |
          cd repo
          cargo clippy --all-features -- -D warnings
      - name: Format check
        run: |
          cd repo
          cargo fmt --check --all
      - name: Build
        run: |
          cd repo
          cargo build --all-features

  # Test: no rebuild needed, lint-build already has the binary
  test:
    runs-on: [hp-z6g4]
    needs: [lint-build]
    steps:
      - name: Checkout
        run: |
          REPO="openclaw/sqlrustgo"
          git clone --depth=1 "http://192.168.0.252:3000/$REPO" repo
          cd repo
          git fetch --depth=1 origin "$GITEA_SHA"
          git checkout "$GITEA_SHA"
      - name: Build
        run: |
          cd repo
          cargo build --all-features
      - name: Run tests
        run: |
          cd repo
          cargo test --all-features 2>&1 | tee test_report.log
      - name: Test summary
        if: always()
        run: |
          cd repo
          PASS=$(grep -c 'test result: ok' test_report.log 2>/dev/null || echo "0")
          FAIL=$(grep -c 'test result: FAILED' test_report.log 2>/dev/null || echo "0")
          echo "Tests: passed=$PASS failed=$FAIL"
          if [ "$FAIL" -gt 0 ]; then exit 1; fi

  # Post-test checks: gate + verify + audit in one job to share clone + build
  postcheck:
    runs-on: [hp-z6g4]
    needs: [test]
    steps:
      - name: Checkout
        run: |
          REPO="openclaw/sqlrustgo"
          git clone --depth=1 "http://192.168.0.252:3000/$REPO" repo
          cd repo
          git fetch --depth=1 origin "$GITEA_SHA"
          git checkout "$GITEA_SHA"
      - name: Run Gate
        run: |
          cd repo
          chmod +x gate/hermes_gate.sh
          bash gate/hermes_gate.sh
      - name: Run verification
        run: |
          cd repo
          python3 verify/verification_engine.py
      - name: Run audit
        run: |
          cd repo
          python3 audit/self_audit.py

risk_summary:
  HIGH:
    - planner (2 tests, missing: JOIN ordering, subquery decorrelation)
    - optimizer (2 tests, missing: CBO cost accuracy)
  MEDIUM:
    - catalog (2 tests, missing: DDL cache invalidation)
    - network (1 test, missing: TCP smoke test)
    - distributed (5 tests, missing: partition simulation)
  LOW:
    - executor (23 tests, comprehensive)
    - storage (3 tests, basic coverage)
    - transaction (4 tests, core scenarios covered)
    - expr (4 tests, corpus coverage)

priority_order:
  - planner_multi_join
  - optimizer_cbo_accuracy
  - network_tcp_smoke
  - catalog_ddl_cache
  - executor_null_agg

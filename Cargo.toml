[workspace]
members = [
    "crates/common",
    "crates/parser",
    "crates/planner",
    "crates/optimizer",
    "crates/executor",
    "crates/storage",
    "crates/catalog",
    "crates/transaction",
    "crates/server",
    "crates/bench",
    "crates/bench-cli",
    "crates/sql-cli",
]

[workspace.package]
version = "1.6.1"
edition = "2021"
authors = ["SQLRustGo Team"]
license = "MIT"

[workspace.dependencies]
# Crates
sqlrustgo-common = { path = "crates/common" }
sqlrustgo-types = { path = "crates/types" }
sqlrustgo-parser = { path = "crates/parser" }
sqlrustgo-planner = { path = "crates/planner" }
sqlrustgo-optimizer = { path = "crates/optimizer" }
sqlrustgo-executor = { path = "crates/executor" }
sqlrustgo-storage = { path = "crates/storage" }
sqlrustgo-catalog = { path = "crates/catalog" }
sqlrustgo-transaction = { path = "crates/transaction" }
sqlrustgo-server = { path = "crates/server" }

# External dependencies
tokio = { version = "1.0", features = ["full"] }
async-trait = "0.1"
anyhow = "1.0"
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
regex = "1.10"
log = "0.4"
env_logger = "0.11"
hex = "0.4"
bytes = "1.0"
lru-cache = "0.1.2"
ctrlc = "3.5.2"
parking_lot = "0.12"
serde_json = "1.0"
num_cpus = "1.17"
tempfile = "3.25.0"
criterion = "0.8"
miniz_oxide = "0.7"
rand = "0.8"
fnv = "1.0"

[dev-dependencies]
criterion = "0.8"
tempfile = "3.25.0"
serde_yaml = "0.9"
rand = "0.8"
clap = { version = "4.0", features = ["derive"] }

[package]
name = "sqlrustgo"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
sqlrustgo-common.workspace = true
sqlrustgo-types.workspace = true
sqlrustgo-parser.workspace = true
sqlrustgo-planner.workspace = true
sqlrustgo-optimizer.workspace = true
sqlrustgo-executor.workspace = true
sqlrustgo-storage.workspace = true
sqlrustgo-catalog.workspace = true
sqlrustgo-transaction.workspace = true
sqlrustgo-server.workspace = true
tokio.workspace = true
async-trait.workspace = true
anyhow.workspace = true
thiserror.workspace = true
serde.workspace = true
log.workspace = true
env_logger.workspace = true
hex.workspace = true
bytes.workspace = true
lru-cache.workspace = true
ctrlc.workspace = true
serde_json.workspace = true

[[test]]
name = "ci_test"
path = "tests/ci/ci_test.rs"

[[bench]]
name = "sql_operations"
harness = false

[[bench]]
